<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 260px;
      padding: 16px;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #fff; }
    #status {
      font-size: 12px;
      color: #888;
      margin-bottom: 12px;
      min-height: 16px;
    }
    #status.ok  { color: #6ee7b7; }
    #status.err { color: #f87171; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #7c3aed;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #6d28d9; }
    button:disabled { background: #444; color: #888; cursor: not-allowed; }
    .hint {
      margin-top: 10px;
      font-size: 11px;
      color: #555;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h2>Obsidian → Claude</h2>
  <div id="status">Checking for note…</div>
  <button id="sendBtn" disabled>Send note to Claude</button>
  <p class="hint">In Obsidian: Ctrl+P → "Send active note to Claude (Bridge)"</p>
  <script src="popup.js"></script>
</body>
</html>
